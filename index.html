
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1v1 魔方對決計時器 - 零重疊版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        .player-zone {
            position: relative;
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 頂中底均分 */
            align-items: center;
            padding: 15px 0; /* 預留上下邊距 */
            transition: background-color 0.15s ease;
            cursor: pointer;
            box-sizing: border-box;
        }

        #p2-zone { 
            transform: rotate(180deg); 
            border-bottom: 1px solid #1e293b; 
        }

        /* 狀態顏色 */
        .ready { background-color: #000; }
        .holding { background-color: #7f1d1d; } 
        .valid { background-color: #166534 !important; } 
        .running { background-color: #000; }
        .finished { background-color: #0f172a; }
        .winner-effect { background-color: #1e3a8a !important; }

        /* 勝場區域：固定在頂部 */
        .header-section {
            width: 100%;
            display: flex;
            justify-content: center;
            height: 20%;
        }

        .win-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .win-count {
            font-size: 2rem;
            font-weight: 900;
            color: #fbbf24;
        }

        .win-label {
            font-size: 0.7rem;
            color: #64748b;
        }

        /* 計時器區域：固定在中央 */
        .timer-section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .timer-display {
            font-size: 22vw; /* 稍微縮小防止重疊 */
            line-height: 1;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        /* 成績區域：固定在底部 */
        .footer-section {
            height: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .ao5-text {
            color: #fbbf24;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .score-history {
            display: flex;
            gap: 10px;
            color: #475569;
            font-size: 0.8rem;
        }

        /* 中央控制按鈕 */
        #center-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn {
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .btn-reset { color: #f87171; border-color: #7f1d1d; }
    </style>
</head>
<body>

    <!-- 玩家 B (上方) -->
    <div id="p2-zone" class="player-zone ready">
        <div class="header-section">
            <div class="win-badge">
                <span class="win-label">WINS</span>
                <span id="p2-wins" class="win-count">0</span>
            </div>
        </div>
        
        <div class="timer-section">
            <div id="p2-timer" class="timer-display">0.00</div>
        </div>
        
        <div class="footer-section">
            <div class="ao5-text">Ao5: <span id="p2-ao5">--</span></div>
            <div id="p2-score-list" class="score-history"></div>
        </div>
    </div>

    <!-- 中央控制按鈕 -->
    <div id="center-bar">
        <button onclick="resetAll()" class="btn btn-reset">全部重置</button>
        <button onclick="toggleFullscreen()" class="btn">全螢幕</button>
    </div>

    <!-- 玩家 A (下方) -->
    <div id="p1-zone" class="player-zone ready">
        <div class="header-section">
            <div class="win-badge">
                <span class="win-label">WINS</span>
                <span id="p1-wins" class="win-count">0</span>
            </div>
        </div>

        <div class="timer-section">
            <div id="p1-timer" class="timer-display">0.00</div>
        </div>
        
        <div class="footer-section">
            <div class="ao5-text">Ao5: <span id="p1-ao5">--</span></div>
            <div id="p2-score-list" class="score-history" id="p1-score-list"></div>
        </div>
    </div>

    <script>
        let p1 = { id: 'p1', state: 'ready', startTime: 0, wins: 0, scores: [], interval: null };
        let p2 = { id: 'p2', state: 'ready', startTime: 0, wins: 0, scores: [], interval: null };

        function calculateAo5(scores) {
            if (scores.length < 5) return null;
            let lastFive = scores.slice(-5);
            let sorted = [...lastFive].sort((a, b) => a - b);
            let sum = sorted[1] + sorted[2] + sorted[3];
            return (sum / 3).toFixed(2);
        }

        function updateUI(p) {
            const zone = document.getElementById(`${p.id}-zone`);
            zone.className = `player-zone ${p.state}`;
            
            // 修正：修正 ID 選擇錯誤問題
            const listEl = p.id === 'p1' ? document.querySelectorAll('.score-history')[1] : document.querySelectorAll('.score-history')[0];
            const displayScores = p.scores.slice(-5);
            listEl.innerHTML = displayScores.map(s => `<span>${s.toFixed(2)}</span>`).join("");
            
            const ao5 = calculateAo5(p.scores);
            document.getElementById(`${p.id}-ao5`).innerText = ao5 || "--";
            document.getElementById(`${p.id}-wins`).innerText = p.wins;
        }

        function startHolding(p) {
            if (p.state === 'running') { stopTimer(p); return; }
            if (['ready', 'finished', 'winner-effect'].includes(p.state)) {
                p.state = 'holding';
                updateUI(p);
                p.holdTimer = setTimeout(() => {
                    if (p.state === 'holding') {
                        p.state = 'valid';
                        updateUI(p);
                    }
                }, 400);
            }
        }

        function releaseHolding(p) {
            if (p.state === 'valid') {
                startTimer(p);
            } else if (p.state === 'holding') {
                clearTimeout(p.holdTimer);
                p.state = 'ready';
                updateUI(p);
            }
        }

        function startTimer(p) {
            const opponent = p.id === 'p1' ? p2 : p1;
            if (opponent.state === 'winner-effect') {
                opponent.state = 'finished';
                updateUI(opponent);
            }

            p.state = 'running';
            p.startTime = Date.now();
            updateUI(p);
            if (p.interval) clearInterval(p.interval);
            p.interval = setInterval(() => {
                const diff = (Date.now() - p.startTime) / 1000;
                document.getElementById(`${p.id}-timer`).innerText = diff.toFixed(2);
            }, 10);
        }

        function stopTimer(p) {
            clearInterval(p.interval);
            const finalTime = (Date.now() - p.startTime) / 1000;
            p.scores.push(finalTime);
            p.state = 'finished';
            updateUI(p);
            checkMatchResult();
        }

        function checkMatchResult() {
            if (p1.state === 'finished' && p2.state === 'finished') {
                const t1 = p1.scores[p1.scores.length - 1];
                const t2 = p2.scores[p2.scores.length - 1];
                if (t1 < t2) { p1.state = 'winner-effect'; p1.wins++; }
                else if (t2 < t1) { p2.state = 'winner-effect'; p2.wins++; }
                updateUI(p1);
                updateUI(p2);
            }
        }

        function resetAll() {
            if (!confirm("確定重置所有數據？")) return;
            [p1, p2].forEach(p => {
                p.scores = []; p.wins = 0; p.state = 'ready';
                document.getElementById(`${p.id}-timer`).innerText = "0.00";
                updateUI(p);
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        const bind = (id, p) => {
            const el = document.getElementById(`${id}-zone`);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); startHolding(p); }, {passive: false});
            el.addEventListener('touchend', (e) => { e.preventDefault(); releaseHolding(p); }, {passive: false});
        };
        bind('p1', p1); bind('p2', p2);
    </script>
</body>
</html>
