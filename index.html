<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1v1 面對面魔方計時器 - 中心控制版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        .player-zone {
            position: relative;
            height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 玩家 B (上方玩家) 旋轉 180 度 */
        #p2-zone {
            transform: rotate(180deg);
        }

        /* 狀態顏色 */
        .ready { background-color: #000; }
        .holding { background-color: #7f1d1d; } 
        .valid { background-color: #166534 !important; } 
        .running { background-color: #000; }
        .finished { background-color: #0f172a; }

        .timer-display {
            font-size: 26vw;
            line-height: 1;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .status-text {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        /* 打亂公式：固定在該區域的頂部，完全遠離中央 */
        .scramble-container {
            position: absolute;
            top: 1.5rem;
            width: 90%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
        }

        .scramble-text {
            color: #3b82f6;
            font-weight: bold;
            font-size: 1rem;
            word-spacing: 0.1rem;
            line-height: 1.2;
            opacity: 0.8;
        }

        .win-counter {
            margin-top: 0.5rem;
            font-size: 1.5rem;
            color: #94a3b8;
        }

        /* 中央控制列：定位在 50% 的位置 */
        #center-bar {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 44px;
            transform: translateY(-50%);
            background-color: #1e293b;
            border-top: 1px solid #334155;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        .control-btn {
            background: #334155;
            color: #f8fafc;
            border: none;
            padding: 4px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: #475569;
        }
    </style>
</head>
<body>

    <!-- 玩家 B (上方) -->
    <div id="p2-zone" class="player-zone ready">
        <div class="scramble-container">
            <div id="p2-scramble" class="scramble-text">Generating...</div>
        </div>
        <div id="p2-status" class="status-text">按住準備</div>
        <div id="p2-timer" class="timer-display">0.00</div>
        <div class="win-counter">勝場: <span id="p2-wins" class="text-red-500">0</span></div>
    </div>

    <!-- 中央控制列 -->
    <div id="center-bar">
        <button onclick="resetWins()" class="control-btn">重置分數</button>
        <button onclick="generateScramble()" class="control-btn" style="background-color: #0369a1;">刷新打亂</button>
        <button onclick="toggleFullscreen()" class="control-btn">全螢幕</button>
    </div>

    <!-- 玩家 A (下方) -->
    <div id="p1-zone" class="player-zone ready">
        <div class="scramble-container">
            <div id="p1-scramble" class="scramble-text">Generating...</div>
        </div>
        <div id="p1-status" class="status-text">按住準備</div>
        <div id="p1-timer" class="timer-display">0.00</div>
        <div class="win-counter">勝場: <span id="p1-wins" class="text-green-500">0</span></div>
    </div>

    <script>
        const MOVES = ["U", "D", "L", "R", "F", "B"];
        const MODS = ["", "'", "2"];
        
        let p1 = { id: 'p1', state: 'ready', startTime: 0, wins: 0, holdTimer: null, interval: null };
        let p2 = { id: 'p2', state: 'ready', startTime: 0, wins: 0, holdTimer: null, interval: null };

        function generateScramble() {
            let scramble = [];
            let lastMove = "";
            for (let i = 0; i < 20; i++) {
                let move = MOVES[Math.floor(Math.random() * MOVES.length)];
                while (move === lastMove) move = MOVES[Math.floor(Math.random() * MOVES.length)];
                scramble.push(move + MODS[Math.floor(Math.random() * MODS.length)]);
                lastMove = move;
            }
            const s = scramble.join(" ");
            document.getElementById('p1-scramble').innerText = s;
            document.getElementById('p2-scramble').innerText = s;
        }

        function updateUI(p) {
            const zone = document.getElementById(`${p.id}-zone`);
            const status = document.getElementById(`${p.id}-status`);
            zone.className = `player-zone ${p.state}`;
            const textMap = {
                'ready': '按住準備',
                'holding': '等待中...',
                'valid': '放手開始！',
                'running': 'SOLVING',
                'finished': 'DONE'
            };
            status.innerText = textMap[p.state];
        }

        function startHolding(p) {
            if (p.state === 'running') { stopTimer(p); return; }
            if (p.state === 'ready' || p.state === 'finished') {
                p.state = 'holding';
                updateUI(p);
                p.holdTimer = setTimeout(() => {
                    if (p.state === 'holding') {
                        p.state = 'valid';
                        updateUI(p);
                    }
                }, 400);
            }
        }

        function releaseHolding(p) {
            if (p.state === 'valid') {
                startTimer(p);
            } else if (p.state === 'holding') {
                clearTimeout(p.holdTimer);
                p.state = 'ready';
                updateUI(p);
            }
        }

        function startTimer(p) {
            p.state = 'running';
            p.startTime = Date.now();
            updateUI(p);
            if (p.interval) clearInterval(p.interval);
            p.interval = setInterval(() => {
                const diff = (Date.now() - p.startTime) / 1000;
                document.getElementById(`${p.id}-timer`).innerText = diff.toFixed(2);
            }, 10);
        }

        function stopTimer(p) {
            clearInterval(p.interval);
            p.state = 'finished';
            updateUI(p);
            checkMatchResult();
        }

        function checkMatchResult() {
            if (p1.state === 'finished' && p2.state === 'finished') {
                const t1 = parseFloat(document.getElementById('p1-timer').innerText);
                const t2 = parseFloat(document.getElementById('p2-timer').innerText);
                if (t1 < t2) p1.wins++;
                else if (t2 < t1) p2.wins++;
                document.getElementById('p1-wins').innerText = p1.wins;
                document.getElementById('p2-wins').innerText = p2.wins;
                // 自動生成下一回合公式
                setTimeout(generateScramble, 1500);
            }
        }

        function resetWins() {
            p1.wins = 0; p2.wins = 0;
            document.getElementById('p1-wins').innerText = 0;
            document.getElementById('p2-wins').innerText = 0;
            generateScramble();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert("手機瀏覽器可能限制了全螢幕功能，請使用『加入主螢幕』功能達到全螢幕效果。");
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 手指事件綁定
        const p1Zone = document.getElementById('p1-zone');
        const p2Zone = document.getElementById('p2-zone');

        p1Zone.addEventListener('touchstart', (e) => { e.preventDefault(); startHolding(p1); }, {passive: false});
        p1Zone.addEventListener('touchend', (e) => { e.preventDefault(); releaseHolding(p1); }, {passive: false});
        
        p2Zone.addEventListener('touchstart', (e) => { e.preventDefault(); startHolding(p2); }, {passive: false});
        p2Zone.addEventListener('touchend', (e) => { e.preventDefault(); releaseHolding(p2); }, {passive: false});

        // 鍵盤輔助 (測試用)
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            if (e.code === 'Space') startHolding(p1);
            if (e.code === 'Enter') startHolding(p2);
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') releaseHolding(p1);
            if (e.code === 'Enter') releaseHolding(p2);
        });

        window.onload = generateScramble;
    </script>
</body>
</html>
